<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬生日祝福</title>
    <style>
        /* 基礎設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: #0a0a1a;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- 登入介面樣式 --- */
        #login-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(255, 126, 179, 0.3);
            z-index: 10;
        }

        #login-container h1 { font-size: 1.8rem; margin-bottom: 10px; }
        #login-container p { color: #ddd; margin-bottom: 25px; }

        input {
            padding: 12px; margin-bottom: 20px; border: none;
            border-radius: 8px; font-size: 16px; width: 80%;
            text-align: center; background: rgba(255, 255, 255, 0.9);
        }

        .btn {
            padding: 12px 30px;
            background: linear-gradient(45deg, #ff7eb3, #ff758c);
            border: none; border-radius: 25px; color: white;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 117, 140, 0.6); }

        #error-msg { color: #ff4d4d; margin-top: 15px; font-size: 0.9rem; display: none; }

        /* --- 動畫與祝福頁面樣式 --- */
        #animation-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* 這裡設定唯美的黃昏漸層背景 */
            background: linear-gradient(to bottom, #2b4162, #fa9c7a);
            display: none;
        }

        /* 巨大的流星墜落特效 */
        .shooting-star {
            position: absolute;
            top: -200px;
            left: 50%;
            width: 6px;
            height: 200px;
            /* 流星的光芒漸層 */
            background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,150,200,0.8) 40%, rgba(255,255,255,0) 100%);
            transform: translateX(-50%) rotate(15deg); /* 稍微傾斜落下 */
            opacity: 0;
            border-radius: 50%;
            box-shadow: 0 0 30px #fff, 0 0 50px #ff7eb3;
        }

        .shooting-star.animate {
            animation: shootDown 2.5s ease-in forwards;
            animation-delay: 0.5s;
        }

        @keyframes shootDown {
            0% { top: -200px; opacity: 1; transform: translateX(-50%) rotate(15deg) scale(1); }
            100% { top: 120vh; opacity: 0; transform: translateX(-30vw) rotate(15deg) scale(0.5); }
        }

        /* 祝福文字區塊 */
        .greeting-text {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; width: 90%;
            z-index: 5;
        }

        .greeting-text.show {
            animation: fadeInText 3s forwards;
            animation-delay: 1.5s; /* 流星劃過一半後文字浮現 */
        }

        .greeting-text h2 {
            font-size: 3rem; margin-bottom: 10px; color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3); letter-spacing: 2px;
        }

        .greeting-text p {
            font-size: 1.2rem; color: #f0f0f0; margin-bottom: 30px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h1>🎁 神秘禮物 🎁</h1>
        <p>密碼提示：四位數</p>
        <input type="password" id="password-input" placeholder="輸入密碼">
        <br>
        <button class="btn" onclick="unlockSurprise()">解鎖</button>
        <p id="error-msg">密碼錯誤！</p>
    </div>

    <div id="animation-container">
        <div class="shooting-star"></div>
        
        <div class="greeting-text">
            <h2>李芯貝生日快樂！</h2>
            <p>看著流星劃過夜空，所有好運都在向你靠近。</p>
            <button class="btn" onclick="replayAnimation()">再看一次</button>
        </div>
    </div>

    <script>
        // 【在這裡修改密碼】
        const correctPassword = "0516"; 

        function unlockSurprise() {
            const pwdInput = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (pwdInput === correctPassword) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('animation-container').style.display = 'block';

                setTimeout(() => {
                    document.querySelector('.shooting-star').classList.add('animate');
                    document.querySelector('.greeting-text').classList.add('show');
                }, 100);
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // 重新播放動畫的功能
        function replayAnimation() {
            const star = document.querySelector('.shooting-star');
            const text = document.querySelector('.greeting-text');
            
            // 先移除動畫 class
            star.classList.remove('animate');
            text.classList.remove('show');
            
            // 重新觸發動畫 (使用一點點延遲讓瀏覽器重新渲染)
            setTimeout(() => {
                star.classList.add('animate');
                text.classList.add('show');
            }, 50);
        }
    </script>
</body>
</html>
